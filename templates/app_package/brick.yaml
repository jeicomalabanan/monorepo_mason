name: app_package
description: Generate a flutter app package
version: 1.0.0

environment:
  mason: ^0.1.2

vars:
  app_name:
    type: string
    description: The name of the Flutter application package.
  org:
    type: string
    description: The organization identifier used for Android and iOS package naming.
    default: team.workspace
  platforms:
    type: string
    description: Comma-separated list of target platforms to enable (e.g. android,ios,web).
    default: android,ios,web
